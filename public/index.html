<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Steam Sale Scout</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 1rem;
    color: #1a1a1a;
  }
  h1 { margin-bottom: 0.25rem; }
  .subtitle { color: #666; margin-top: 0; }
  .controls {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin: 1rem 0;
    padding: 0.75rem;
    background: #f4f4f4;
    border-radius: 6px;
  }
  .controls label { display: flex; align-items: center; gap: 0.4rem; }
  .controls input[type="number"] { width: 4rem; }
  .totals { margin: 0.75rem 0; color: #333; font-size: 0.95rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid #e0e0e0; }
  th { position: sticky; top: 0; background: #fff; cursor: default; }
  img.icon { width: 32px; height: 32px; vertical-align: middle; }
  .weight-bar-track {
    background: #e0e0e0;
    border-radius: 3px;
    height: 14px;
    width: 160px;
    overflow: hidden;
  }
  .weight-bar-fill {
    background: #2a6df5;
    height: 100%;
  }
  .status { color: #666; font-style: italic; }
  .error {
    color: #900;
    background: #fdeaea;
    border: 1px solid #f0b8b8;
    padding: 0.75rem;
    border-radius: 6px;
  }
  button { cursor: pointer; }
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin: 1rem 0 0;
    border-bottom: 1px solid #ddd;
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 0.5rem 1rem;
    font-size: 1rem;
    color: #666;
    border-bottom: 2px solid transparent;
  }
  .tab-btn[aria-selected="true"] {
    color: #1a1a1a;
    font-weight: 600;
    border-bottom-color: #2a6df5;
  }
  .tab-panel { margin-top: 1rem; }
  s.regular-price { color: #999; }
  .badge {
    display: inline-block;
    padding: 0.1rem 0.45rem;
    border-radius: 3px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .badge-cut { background: #2a6df5; color: #fff; }
  .badge-low { background: #1a8a3c; color: #fff; margin-left: 0.4rem; }
</style>

<h1>Steam Sale Scout</h1>
<p class="subtitle">Your library, ranked by what you actually play (hours × recency).</p>

<nav class="tabs">
  <button type="button" class="tab-btn" data-tab="library" aria-selected="true">Library</button>
  <button type="button" class="tab-btn" data-tab="deals" aria-selected="false">Deals</button>
</nav>

<section id="tab-library" class="tab-panel">
  <div class="controls">
    <label>
      Recency window (months):
      <input type="number" id="window-months" min="1" step="1" />
    </label>
    <label>
      <input type="checkbox" id="sort-hours" />
      Sort by raw hours instead of weight
    </label>
    <button id="refresh-btn" type="button">Refresh from Steam</button>
  </div>

  <div id="status" class="status">Loading…</div>
  <div id="totals" class="totals"></div>
  <table id="table" hidden>
    <thead>
      <tr>
        <th>#</th>
        <th></th>
        <th>Name</th>
        <th>Hours</th>
        <th>Last played</th>
        <th>Weight</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</section>

<section id="tab-deals" class="tab-panel" hidden>
  <div class="controls">
    <label>
      Minimum discount (%):
      <input type="number" id="min-cut" min="40" max="90" step="1" />
    </label>
    <label>
      Sort by:
      <select id="deals-sort">
        <option value="cut">% off</option>
        <option value="price">Price</option>
        <option value="title">Title</option>
      </select>
    </label>
    <button id="deals-refresh-btn" type="button">Refresh from ITAD</button>
  </div>

  <div id="deals-status" class="status">Loading…</div>
  <div id="deals-totals" class="totals"></div>
  <table id="deals-table" hidden>
    <thead>
      <tr>
        <th>Name</th>
        <th>Price (AUD)</th>
        <th>Regular</th>
        <th>% off</th>
        <th>Store</th>
      </tr>
    </thead>
    <tbody id="deals-table-body"></tbody>
  </table>
</section>

<script type="module">
  import { weight } from "./weight.js";

  const STORAGE_KEY = "steam-sale-scout.windowMonths";
  const DEFAULT_WINDOW_MONTHS = 12;

  const statusEl = document.getElementById("status");
  const totalsEl = document.getElementById("totals");
  const tableEl = document.getElementById("table");
  const tableBodyEl = document.getElementById("table-body");
  const windowInput = document.getElementById("window-months");
  const sortHoursCheckbox = document.getElementById("sort-hours");
  const refreshBtn = document.getElementById("refresh-btn");

  let games = [];

  function loadWindowMonths() {
    const stored = Number(localStorage.getItem(STORAGE_KEY));
    return stored > 0 ? stored : DEFAULT_WINDOW_MONTHS;
  }

  windowInput.value = loadWindowMonths();

  function iconUrl(game) {
    if (!game.img_icon_url) return "";
    return `https://media.steampowered.com/steamcommunity/public/images/apps/${game.appid}/${game.img_icon_url}.jpg`;
  }

  function formatHours(game) {
    return ((game.playtime_forever || 0) / 60).toFixed(1);
  }

  function formatLastPlayed(game, now = Date.now()) {
    const rtime = game.rtime_last_played;
    if (!rtime) return "never";
    const elapsedMs = now - rtime * 1000;
    const days = elapsedMs / (24 * 60 * 60 * 1000);
    if (days < 1) return "today";
    if (days < 2) return "yesterday";
    if (days < 30) {
      const d = Math.round(days);
      return `${d} day${d === 1 ? "" : "s"} ago`;
    }
    const months = Math.round(days / 30.44);
    if (months < 12) {
      return `${months} month${months === 1 ? "" : "s"} ago`;
    }
    const years = Math.round(months / 12);
    return `${years} year${years === 1 ? "" : "s"} ago`;
  }

  function render() {
    const windowMonths = Number(windowInput.value) || DEFAULT_WINDOW_MONTHS;
    const sortByHours = sortHoursCheckbox.checked;

    const rows = games.map((game) => ({
      game,
      weight: weight(game, windowMonths),
    }));

    rows.sort((a, b) => {
      if (sortByHours) {
        return (b.game.playtime_forever || 0) - (a.game.playtime_forever || 0);
      }
      return b.weight - a.weight;
    });

    const maxWeight = rows.reduce((max, r) => Math.max(max, r.weight), 0) || 1;

    tableBodyEl.innerHTML = "";
    rows.forEach((row, index) => {
      const tr = document.createElement("tr");

      const rankTd = document.createElement("td");
      rankTd.textContent = index + 1;
      tr.appendChild(rankTd);

      const iconTd = document.createElement("td");
      const url = iconUrl(row.game);
      if (url) {
        const img = document.createElement("img");
        img.className = "icon";
        img.src = url;
        img.alt = "";
        iconTd.appendChild(img);
      }
      tr.appendChild(iconTd);

      const nameTd = document.createElement("td");
      nameTd.textContent = row.game.name || `App ${row.game.appid}`;
      tr.appendChild(nameTd);

      const hoursTd = document.createElement("td");
      hoursTd.textContent = formatHours(row.game);
      tr.appendChild(hoursTd);

      const lastPlayedTd = document.createElement("td");
      lastPlayedTd.textContent = formatLastPlayed(row.game);
      tr.appendChild(lastPlayedTd);

      const weightTd = document.createElement("td");
      const track = document.createElement("div");
      track.className = "weight-bar-track";
      const fill = document.createElement("div");
      fill.className = "weight-bar-fill";
      fill.style.width = `${(row.weight / maxWeight) * 100}%`;
      track.appendChild(fill);
      weightTd.appendChild(track);
      tr.appendChild(weightTd);

      tableBodyEl.appendChild(tr);
    });

    const neverPlayed = games.filter((g) => !g.rtime_last_played).length;
    totalsEl.textContent = `${games.length} games · ${neverPlayed} never played`;

    tableEl.hidden = false;
  }

  async function loadLibrary(refresh = false) {
    statusEl.textContent = "Loading…";
    statusEl.hidden = false;
    tableEl.hidden = true;
    statusEl.className = "status";

    try {
      const res = await fetch(refresh ? "/api/library?refresh=1" : "/api/library");
      const body = await res.json();
      if (!res.ok) {
        throw new Error(body.error || `Request failed with status ${res.status}`);
      }
      games = body.games || [];
      statusEl.hidden = true;
      render();
    } catch (err) {
      statusEl.textContent = err.message;
      statusEl.className = "status error";
    }
  }

  windowInput.addEventListener("input", () => {
    const raw = Number(windowInput.value);
    const value = raw > 0 ? raw : DEFAULT_WINDOW_MONTHS;
    windowInput.value = value;
    localStorage.setItem(STORAGE_KEY, String(value));
    render();
  });

  sortHoursCheckbox.addEventListener("change", render);

  refreshBtn.addEventListener("click", () => loadLibrary(true));

  loadLibrary();

  // --- Tabs ---------------------------------------------------------------

  const tabButtons = document.querySelectorAll(".tab-btn");
  const tabPanels = {
    library: document.getElementById("tab-library"),
    deals: document.getElementById("tab-deals"),
  };
  let dealsLoaded = false;

  tabButtons.forEach((btn) => {
    btn.addEventListener("click", () => {
      const tab = btn.dataset.tab;
      tabButtons.forEach((b) => b.setAttribute("aria-selected", String(b === btn)));
      Object.entries(tabPanels).forEach(([name, panel]) => {
        panel.hidden = name !== tab;
      });
      if (tab === "deals" && !dealsLoaded) {
        dealsLoaded = true;
        loadDeals();
      }
    });
  });

  // --- Deals (Increment 2) -------------------------------------------------

  const MIN_CUT_STORAGE_KEY = "steam-sale-scout.minCut";
  const DEFAULT_MIN_CUT = 60;
  const MIN_CUT_MIN = 40;
  const MIN_CUT_MAX = 90;

  const dealsStatusEl = document.getElementById("deals-status");
  const dealsTotalsEl = document.getElementById("deals-totals");
  const dealsTableEl = document.getElementById("deals-table");
  const dealsTableBodyEl = document.getElementById("deals-table-body");
  const minCutInput = document.getElementById("min-cut");
  const dealsSortSelect = document.getElementById("deals-sort");
  const dealsRefreshBtn = document.getElementById("deals-refresh-btn");

  let deals = [];

  function loadMinCut() {
    const stored = Number(localStorage.getItem(MIN_CUT_STORAGE_KEY));
    if (stored >= MIN_CUT_MIN && stored <= MIN_CUT_MAX) return stored;
    return DEFAULT_MIN_CUT;
  }

  minCutInput.value = loadMinCut();

  function renderDeals() {
    const sortBy = dealsSortSelect.value;
    const sorted = [...deals];
    if (sortBy === "price") {
      sorted.sort((a, b) => (a.price ?? Infinity) - (b.price ?? Infinity));
    } else if (sortBy === "title") {
      sorted.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
    } else {
      sorted.sort((a, b) => (b.cut ?? 0) - (a.cut ?? 0));
    }

    dealsTableBodyEl.innerHTML = "";
    sorted.forEach((deal) => {
      const tr = document.createElement("tr");

      const nameTd = document.createElement("td");
      nameTd.textContent = deal.title || "(untitled)";
      tr.appendChild(nameTd);

      const priceTd = document.createElement("td");
      priceTd.textContent = deal.price != null ? `$${deal.price.toFixed(2)}` : "—";
      tr.appendChild(priceTd);

      const regularTd = document.createElement("td");
      if (deal.regular != null) {
        const s = document.createElement("s");
        s.className = "regular-price";
        s.textContent = `$${deal.regular.toFixed(2)}`;
        regularTd.appendChild(s);
      }
      tr.appendChild(regularTd);

      const cutTd = document.createElement("td");
      const cutBadge = document.createElement("span");
      cutBadge.className = "badge badge-cut";
      cutBadge.textContent = `-${deal.cut}%`;
      cutTd.appendChild(cutBadge);
      if (deal.atHistoricalLow) {
        const lowBadge = document.createElement("span");
        lowBadge.className = "badge badge-low";
        lowBadge.textContent = "HISTORICAL LOW";
        if (deal.historicalLow != null) {
          lowBadge.title = `Recorded low: $${deal.historicalLow.toFixed(2)}`;
        }
        cutTd.appendChild(lowBadge);
      }
      tr.appendChild(cutTd);

      const storeTd = document.createElement("td");
      if (deal.appid) {
        const a = document.createElement("a");
        a.href = `https://store.steampowered.com/app/${deal.appid}`;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = "Steam";
        storeTd.appendChild(a);
      }
      tr.appendChild(storeTd);

      dealsTableBodyEl.appendChild(tr);
    });

    const atLowCount = deals.filter((d) => d.atHistoricalLow).length;
    dealsTotalsEl.textContent = `${deals.length} deals at ≥${minCutInput.value}% off · ${atLowCount} at historical low`;

    dealsTableEl.hidden = false;
  }

  async function loadDeals(refresh = false) {
    dealsStatusEl.textContent = "Loading…";
    dealsStatusEl.hidden = false;
    dealsTableEl.hidden = true;
    dealsStatusEl.className = "status";

    const minCut = loadMinCut();
    const params = new URLSearchParams({ minCut: String(minCut) });
    if (refresh) params.set("refresh", "1");

    try {
      const res = await fetch(`/api/deals?${params}`);
      const body = await res.json();
      if (!res.ok) {
        throw new Error(body.error || `Request failed with status ${res.status}`);
      }
      deals = body.deals || [];
      dealsStatusEl.hidden = true;
      renderDeals();
    } catch (err) {
      dealsStatusEl.textContent = err.message;
      dealsStatusEl.className = "status error";
    }
  }

  minCutInput.addEventListener("change", () => {
    let value = Number(minCutInput.value);
    if (!(value >= MIN_CUT_MIN && value <= MIN_CUT_MAX)) value = DEFAULT_MIN_CUT;
    minCutInput.value = value;
    localStorage.setItem(MIN_CUT_STORAGE_KEY, String(value));
    loadDeals();
  });

  dealsSortSelect.addEventListener("change", renderDeals);

  dealsRefreshBtn.addEventListener("click", () => loadDeals(true));
</script>
