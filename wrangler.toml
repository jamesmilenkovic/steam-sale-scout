name = "steam-sale-scout"
main = "src/worker.js"
compatibility_date = "2025-06-01"

# Static single-page frontend. Requests that don't match a file in ./public
# fall through to the Worker's fetch handler (e.g. /api/*).
[assets]
directory = "./public"
binding = "ASSETS"

# SteamSpy tag/median/review cache (Increment 3), keyed by appid, 30d/24h TTL
# (see src/worker.js). `id` is a placeholder — `wrangler dev` simulates KV
# entirely locally and doesn't validate it against a real Cloudflare account.
# This project is local-only through Phase 1 (see SPEC.md); a real namespace
# would need to be created with `wrangler kv namespace create` before deploy.
[[kv_namespaces]]
binding = "TAG_CACHE"
id = "local-dev-tag-cache-placeholder"

# FPM catalog (Increment 7.7) — the lane's own durable store, so the
# multi-run HowLongToBeat fill survives `wrangler dev` restarts instead of
# starting over each time. `database_id` is a placeholder, same convention
# as TAG_CACHE above: `wrangler dev` simulates D1 entirely locally
# (state lands under .wrangler/state/v3/d1/), no real Cloudflare account
# needed. Schema is created on demand (CREATE TABLE IF NOT EXISTS in
# src/catalog.js), not via `wrangler d1 migrations` — see that file's
# ensureCatalogSchema for the reasoning.
[[d1_databases]]
binding = "FPM_DB"
database_name = "fpm-catalog"
database_id = "local-dev-fpm-catalog-placeholder"
